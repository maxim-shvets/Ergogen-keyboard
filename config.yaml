meta:
  engine: 4.1.0

units:
  kx: cx
  ky: cy
  # padding vars
  px: kx + 2
  py: ky + 2

points:
  zones:
    matrix:
      # fix kicad placement
      anchor:
        shift: [150, -150]
      key:
        padding: 1ky
        spread: 1kx
      columns:
        tabs:
          key:
            column_net: P1
          rows:
            mods:
              skip: true
        pinky:
          key:
            column_net: P0
            stagger: 8
            splay: -3
            spread: 1.05kx
        ring:
          key:
            column_net: P2
            spread: 1.05kx
            stagger: 7
            splay: -4
        middle:
          key:
            column_net: P3
            spread: 1.05kx
            stagger: 3
            splay: -3
        index:
          rows:
            mods:
              skip: true
          key:
            column_net: P4
            stagger: -6
            splay: -2
        inner:
          rows:
            mods:
              skip: true
          key:
            column_net: P5
            stagger: -5
            splay: -3
      rows:
        mods:
          row_net: P14
        bottom:
          row_net: P8
        home:
          row_net: P7
        top:
          row_net: P6

    thumbs:
      key:
        padding: 1ky
        spread: 1.5kx
      anchor:
        ref: matrix_inner_bottom
        shift: [(kx / 2) - 15, (-ky) - 5]
      columns:
        left:
          key:
            column_net: P4
            width: 2kx
        mid:
          key:
            column_net: P5
      rows:
        top:
          row_net: P14

    thumbs2:
      key:
        padding: 1ky
        spread: 1kx
      anchor:
        ref: thumbs_left_top
        shift: [-kx / 2, -ky]
      columns:
        left:
          key:
            column_net: P3
        mid:
          key:
            column_net: P4
        right:
          key:
            column_net: P5
      rows:
        main:
          row_net: P15

outlines:
  raw:
    - what: rectangle
      where: true
      size: [px, py]

  keys:
    - what: rectangle
      where: true
      bound: false
      size: [kx - 0.5, ky - 0.5]

  board:
    - what: polygon
      operation: stack
      points:
        - ref: matrix_tabs_top
          shift: [-0.5px, 0.5py]
        - ref: matrix_pinky_top
          shift: [-0.5px, 0.5py]
        - ref: matrix_ring_top
          shift: [-0.5px, 0.65py]
        - ref: matrix_middle_top
          shift: [-0.5px, 0.65py]
        - ref: matrix_middle_top
          shift: [0.5px, 0.65py]
        - ref: matrix_index_top
          shift: [0.5px, 0.65py]
        - ref: matrix_inner_top
          shift: [0.5px, 0.5py]
        - ref: matrix_inner_top
          shift: [1.5px, 0.5py]
        - ref: thumbs_mid_top
          shift: [0.5px, 0.5py]
        - ref: thumbs2_right_main
          shift: [0.5px, -0.5py]
        - ref: thumbs2_left_main
          shift: [-0.5px, -0.5py]
        - ref: matrix_middle_mods
          shift: [0.5px, -0.5py]
        - ref: matrix_pinky_mods
          shift: [0.5px, -0.5py]
        - ref: matrix_pinky_mods
          shift: [-0.5px, -0.5py]
        - ref: matrix_tabs_bottom
          shift: [-0.5px, -0.5py]
      fillet: 2

  combo:
    - name: board
    - operation: subtract
      name: keys

pcbs:
  tutorial:
    outlines:
      main:
        outline: board
    footprints:
      choc_hotswap:
        what: choc
        where: true
        params:
          keycaps: true
          reverse: true
          hotswap: true
          from: "{{column_net}}"
          to: "{{colrow}}"

      diode:
        what: diode
        where: true
        params:
          from: "{{colrow}}"
          to: "{{row_net}}"
        adjust:
          shift: [0, -5]

      nicenano:
        what: rev_nano
        where:
          ref: matrix_inner_top
          shift: [20,-9.5]
          rotate: -0

      oled:
        what: display_ssd1306
        params:
          reversible: true
          SDA: P10
          SCL: P16
        where:
          ref.aggregate.parts: [matrix_inner_home]
          shift: [20,4.5]
          rotate: 0

      battery_plug:
        what: rev_jstph
        params:
          pos: pos
          neg: GND
        where:
          ref.aggregate.parts: [matrix_inner_bottom]
          shift: [13.5,-3]
          rotate: 0

      battery_switch:
        what: rev_slider
        params:
          from: pos
          to: RAW
        where:
          ref.aggregate.parts: [matrix_inner_bottom]
          shift: [28.5,-5.5]
          rotate: -90

      reset:
        what: rev_button
        params: 
          from: GND
          to: RST 
        where:
          ref.aggregate.parts: [matrix_inner_bottom]
          shift: [21,-5.5]
          rotate: -90
      hole_top_left:
        what: mountinghole
        where:
          ref: [matrix_tabs_top]
          shift: [8,12]
      hole_bottom_left:
        what: mountinghole
        where:
          ref: [matrix_tabs_bottom]
          shift: [6,-12]
      hole_thumb_left:
        what: mountinghole
        where:
          ref: [thumbs_left_top]
          shift: [-12,12]
      hole_thumb_right:
        what: mountinghole
        where:
          ref: [thumbs2_right_main]
          shift: [-9,-5]
      hole_index_left:
        what: mountinghole
        where:
          ref: [matrix_index_top]
          shift: [-6,12]
      hole_middle_home:
        what: mountinghole
        where:
          ref: [matrix_middle_home]
          shift: [-10,-6]

cases: